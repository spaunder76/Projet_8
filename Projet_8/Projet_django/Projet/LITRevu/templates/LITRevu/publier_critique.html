{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Publier une critique - LITRevu</title>
    <!-- Inclure les fichiers CSS -->
    <link rel ="stylesheet" href="{% static 'global.css' %}">
    <link rel ="stylesheet" href="{% static 'LITRevu/css/main.css' %}"></head>
<body>
    <div class="container">
        <h1>Publier une critique</h1>
        <form method="post">
            {% csrf_token %}
            <label for="titre">Titre :</label><br>
            <input type="text" id="titre" name="titre"><br>
            <label for="contenu">Contenu :</label><br>
            <textarea id="contenu" name="contenu" rows="4" cols="50"></textarea><br>
            <input type="submit" value="Publier">
        </form>
    </div>
</body>
</html>
