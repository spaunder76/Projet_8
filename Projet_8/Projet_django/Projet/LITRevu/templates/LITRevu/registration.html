{% load static %}
<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Inscription - LITRevu</title> 
    <link rel ="stylesheet" href="{% static 'global.css' %}">
    <link rel="stylesheet" href="{% static 'LITRevu/css/main.css' %}">
</head>
<body>
    <div class="bandeau">
        <h1>LITRevu</h1>
        <a href="{% url 'indexofLITRevu' %}" id="bouton-menu">Accueil</a>
    </div>
    <div class="container">
        <h2>Inscription</h2>
        <form action="{% url 'registration_page' %}" method="post">
            {% csrf_token %}
            <label for="username">Nom d'utilisateur:</label><br>
            <input type="text" id="username" name="username"><br>
            <label for="email">Adresse email:</label><br>
            <input type="email" id="email" name="email"><br>
            <label for="password1">Mot de passe:</label><br>
            <input type="password" id="password1" name="password1"><br>
            <label for="password2">Confirmer le mot de passe:</label><br>
            <input type="password" id="password2" name="password2"><br><br>
            <input type="submit" value="S'inscrire">
        </form>
            {% if user.is_authenticated %}
        <form action="{% url 'logout' %}" method="post">
            {% csrf_token %}
            <button type="submit">Déconnexion</button>
        </form>
            {% endif %}
    </div>
</body>
</html>
